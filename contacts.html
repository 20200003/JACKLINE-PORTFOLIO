<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jackline Kagendo Peter</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --whatsapp: #25D366; /* WhatsApp Green */
            --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --text: #636e72;
            --bg: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .contact-card {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .degree-tag { color: var(--accent); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .links-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s;
            display: block;
        }

        .btn:hover { transform: scale(1.03); }

        .btn-whatsapp { background-color: var(--whatsapp); }
        .btn-email { background-color: var(--accent); }
        .btn-insta { background: var(--insta-grad); }
        .btn-back { background: #dfe6e9; color: var(--primary); margin-top: 1rem; }

        footer { margin-top: 2rem; font-size: 0.8rem; color: #b2bec3; }
    </style>
</head>
<body>

<div class="contact-card">
    <span class="degree-tag">Bachelor's Degree Holder</span>
    <h1>Let's Connect</h1>
    <p>Biochemist | Full-Stack Developer</p>

    <div class="links-container">
         <a href="https://wa.me/254716426232" target="_blank" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </a>
        <a href="mailto:Kjackpeter9@gmail.com" class="btn btn-email">
            📧 Send an Email
        </a>

        <a href="https://www.instagram.com/Jackie_amidh" class="btn btn-insta" target="_blank">
            📸 Instagram Handle
        </a>

        <a href="index.html" class="btn btn-back">← Back to Portfolio</a>
    </div>

    <footer>
        &copy; 2026 Jackline Kagendo Peter
    </footer>
</div>

</body>
</html>
